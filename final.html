<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>生日快乐 | Stardew Birthday Adventure</title>
    <link rel="stylesheet" href="./final.css" />
  </head>
  <body>
    <main class="ending-shell">
      <canvas id="fireworksCanvas" width="960" height="640" aria-label="生日烟花结尾"></canvas>
      <section class="ending-panel">
        <p class="ending-kicker">10 / 10 礼物已找到</p>
        <h1>生日快乐</h1>
        <div id="letterText" class="ending-letter"></div>
        <div class="ending-actions">
          <button id="replayButton" type="button">重新开始冒险</button>
          <a id="farmButton" href="./index.html?return=farm">回到生日农场</a>
        </div>
      </section>
      <audio id="endingSong" src="./best-friend.MP3" loop preload="auto" autoplay></audio>
    </main>
    <script src="./final.js"></script>
  </body>
</html>
